server:
  port: 8082

spring:
  application:
    name: gerenciador-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gerenciador_db}
    username: ${DB_USERNAME:rocker}
    password: ${DB_PASSWORD:rocker123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  provider: local
  local:
    upload-dir: uploads
    public-url-prefix: /uploads
  s3:
    bucket-name:
    region:
    access-key:
    secret-key:
    public-url-prefix:

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  aluno:
    secret: ${JWT_ALUNO_SECRET:rockepilates-aluno-secret-key-dev-precisa-ter-mais-de-32-caracteres}
    expiration: ${JWT_ALUNO_EXPIRATION:86400000}
