server:
  port: 8080

spring:
  application:
    name: bff-pilates

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  cloud:
    openfeign:
      circuitbreaker:
        enabled: false
      client:
        config:
          default:
            connectTimeout: 10000
            readTimeout: 300000

gerenciador:
  url: http://localhost:8082