services:
  postgres:
    image: postgres:15
    container_name: postgres-rockepilates
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usuarios_db}
      POSTGRES_USER: ${POSTGRES_USER:-rocker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rocker123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  usuarios-service:
    build:
      context: .
      dockerfile: backend/usuarios-service/Dockerfile
    container_name: usuarios-service
    restart: always
    depends_on:
      - postgres
    environment:
      DB_URL: ${USUARIOS_DB_URL:-jdbc:postgresql://postgres:5432/usuarios_db}
      DB_USERNAME: ${DB_USERNAME:-rocker}
      DB_PASSWORD: ${DB_PASSWORD:-rocker123}
      JWT_SECRET: ${JWT_SECRET:-NPOV4SQF9JGL7qUwFFUXy_68nLyjj9KMOPckZl2qZF6XbFE9NI0XKJ0wL3bev-LB}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8081:8081"

  gerenciador-service:
    build:
      context: .
      dockerfile: backend/gerenciador-service/Dockerfile
    container_name: gerenciador-service
    restart: always
    depends_on:
      - postgres
    environment:
      DB_URL: ${GERENCIADOR_DB_URL:-jdbc:postgresql://postgres:5432/gerenciador_db}
      DB_USERNAME: ${DB_USERNAME:-rocker}
      DB_PASSWORD: ${DB_PASSWORD:-rocker123}
      JWT_ALUNO_SECRET: ${JWT_ALUNO_SECRET:-rockepilates-aluno-secret-key-dev-precisa-ter-mais-de-32-caracteres}
      JWT_ALUNO_EXPIRATION: ${JWT_ALUNO_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8082:8082"
    volumes:
      - ./uploads:/app/uploads

  bff-pilates:
    build:
      context: .
      dockerfile: backend/bff-pilates/Dockerfile
    container_name: bff-pilates
    restart: always
    depends_on:
      - usuarios-service
      - gerenciador-service
    environment:
      USUARIOS_URL: ${USUARIOS_URL:-http://usuarios-service:8081}
      GERENCIADOR_URL: ${GERENCIADOR_URL:-http://gerenciador-service:8082}
      JWT_ALUNO_SECRET: ${JWT_ALUNO_SECRET:-rockepilates-aluno-secret-key-dev-precisa-ter-mais-de-32-caracteres}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/rockepilates-web/Dockerfile
      args:
        NEXT_PUBLIC_BFF_URL: ${NEXT_PUBLIC_BFF_URL:-http://localhost:8080}
    container_name: rockepilates-web
    restart: always
    depends_on:
      - bff-pilates
    environment:
      NEXT_PUBLIC_BFF_URL: ${NEXT_PUBLIC_BFF_URL:-http://localhost:8080}
      BFF_INTERNAL_URL: ${BFF_INTERNAL_URL:-http://bff-pilates:8080}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
