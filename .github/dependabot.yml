version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: monthly
    target-branch: develop
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /frontend/rockepilates-web
    schedule:
      interval: monthly
    target-branch: develop
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: develop
    open-pull-requests-limit: 5

