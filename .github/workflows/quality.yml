name: Quality

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_PASSWORD: ci-only-database-password
      JWT_SECRET: ci-only-admin-secret-with-more-than-32-characters
      JWT_ALUNO_SECRET: ci-only-student-secret-with-more-than-32-characters
      INTERNAL_SERVICE_TOKEN: ci-only-internal-service-token
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test and verify coverage
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification --no-daemon

      - name: Publish test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/**/build/reports/tests/
            backend/**/build/reports/jacoco/
          if-no-files-found: warn

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend/rockepilates-web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/rockepilates-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_BFF_URL: http://localhost:8080
          BFF_INTERNAL_URL: http://localhost:8080
        run: npm run build
